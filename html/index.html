<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioHub Premium Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-body: #050505; --surface: #0A0A0A; --text-main: #FFFFFF; --text-sub: #A3A3A3;
            --b-grad-1: #C9A94D; --b-grad-2: #F5D97A; --card-shadow: 0 20px 40px rgba(0,0,0,0.8);
            --metal-color: #D4AF37; --metal-grad: linear-gradient(135deg, #B8962E 0%, #F5D97A 40%, #D4AF37 60%, #B8962E 100%);
            --metal-highlight: inset 0 1px 2px rgba(255,255,255,0.5), inset 0 -3px 5px rgba(0,0,0,0.6);
            --fx-glow: rgba(212, 175, 55, 0.4); --fx-cursor: rgba(212, 175, 55, 0.15);
        }
        html.theme-cyan {
            --bg-body: #020202; --surface: #05070A; --text-main: #E6F7FF; --text-sub: #8AA4B2;
            --b-grad-1: #00E5FF; --b-grad-2: #009FB3; --card-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
            --metal-color: #00E5FF; --metal-grad: linear-gradient(135deg, #009FB3 0%, #7AF7FF 40%, #00E5FF 60%, #009FB3 100%);
            --metal-highlight: inset 0 1px 2px rgba(255,255,255,0.6), inset 0 -3px 5px rgba(0,0,0,0.6);
            --fx-glow: rgba(0, 229, 255, 0.6); --fx-cursor: rgba(0, 229, 255, 0.2);
        }
        body {
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), var(--fx-cursor) 0%, transparent 40%);
            color: var(--text-main); transition: all 0.5s ease; overflow-x: hidden; margin: 0;
        }

        /* KHUNG VIỀN & NÚT KIM LOẠI */
        .spec-border-premium {
            background: linear-gradient(var(--surface), var(--surface)) padding-box, linear-gradient(135deg, var(--b-grad-1), var(--b-grad-2)) border-box;
            border: 1.5px solid transparent; border-radius: 10px; box-shadow: var(--card-shadow); transition: box-shadow 0.3s ease, transform 0.1s ease;
        }
        .btn-metal-premium {
            background: var(--metal-grad); box-shadow: var(--metal-highlight), 0 0 15px var(--fx-glow); color: #000;
            position: relative; overflow: hidden; border: none; border-radius: 6px;
        }
        .btn-metal-premium::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); animation: sweep 2.5s infinite;
        }
        @keyframes sweep { 0% { left: -100%; } 20%, 100% { left: 200%; } }

        /* TAB & SLIDER */
        .tab-active { background: var(--metal-grad); color: #000; font-weight: bold; box-shadow: 0 0 10px var(--fx-glow); }
        .tab-inactive { background: rgba(255,255,255,0.05); color: var(--text-sub); border: 1px solid var(--b-grad-2); }
        input[type=range].premium-slider { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range].premium-slider::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 99px; }
        input[type=range].premium-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--metal-grad); box-shadow: var(--metal-highlight), 0 0 10px var(--metal-color); margin-top: -7px; cursor: pointer; transition: transform 0.2s; }
        input[type=range].premium-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* HIỆU ỨNG CHUỘT */
        #dynamic-cursor { position: fixed; width: 150px; height: 150px; background: radial-gradient(circle, var(--fx-cursor) 0%, transparent 60%); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 9999; mix-blend-mode: screen; transition: left 0.05s linear, top 0.05s linear; }
        .particle { position: fixed; background: var(--metal-color); border-radius: 50%; pointer-events: none; box-shadow: 0 0 10px var(--metal-color); animation: particle-fade 0.8s forwards; z-index: 9998; transform: translate(-50%, -50%); }
        @keyframes particle-fade { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0); opacity: 0; } }
        
        /* SPINNER */
        .spinner-neon { width: 24px; height: 24px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--metal-color); animation: spin 1s linear infinite, pulseNeon 1.5s ease-in-out infinite; }
        @keyframes pulseNeon { 0%, 100% { box-shadow: 0 0 5px var(--fx-cursor); } 50% { box-shadow: 0 0 15px var(--fx-glow); } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="font-sans min-h-screen p-4 md:p-10">

    <div id="dynamic-cursor"></div>

    <div class="max-w-4xl mx-auto space-y-8 relative z-10">
        
        <!-- HEADER -->
        <div class="spec-border-premium p-6 flex justify-between items-center bg-[var(--surface)]">
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-widest text-transparent bg-clip-text uppercase" style="background-image: var(--metal-grad)" id="title-text">AUDIOHUB ENGINE</h1>
                <p class="text-[var(--text-sub)] text-sm tracking-wide mt-1" id="sub-text">MCDM Premium Calculation</p>
            </div>
            <button onclick="switchTheme()" class="p-2.5 border border-[var(--b-grad-2)] rounded text-[var(--text-main)] hover:bg-[rgba(255,255,255,0.05)] transition-all cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 0 8 1v14zm0 1A8 8 0 1 1 8 0a8 8 0 0 1 0 16z"/></svg>
            </button>
        </div>

        <!-- BẢNG ĐIỀU KHIỂN -->
        <div class="spec-border-premium p-6 md:p-8 bg-[var(--surface)]">
            
            <!-- TABS -->
            <div class="flex flex-wrap justify-center gap-4 mb-8">
                <button data-cat="TWS" class="tab-btn tab-active px-6 py-2.5 rounded uppercase text-sm tracking-widest transition-all">TWS Earbuds</button>
                <button data-cat="WIRED" class="tab-btn tab-inactive px-6 py-2.5 rounded uppercase text-sm tracking-widest transition-all">Wired IEMs</button>
                <button data-cat="SPEAKER" class="tab-btn tab-inactive px-6 py-2.5 rounded uppercase text-sm tracking-widest transition-all">Speakers</button>
            </div>

            <!-- PREF & SLIDERS -->
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-[var(--text-sub)] mb-2 uppercase tracking-wider">Audio Signature Target</label>
                    <select id="userPref" class="w-full p-3 bg-[#0A0A0A] border border-[var(--b-grad-2)] text-[var(--text-main)] rounded outline-none focus:ring-1 focus:ring-[var(--metal-color)]">
                        <option value="Neutral">Neutral (Cân bằng, chi tiết)</option>
                        <option value="Warm">Warm (Ấm áp, mượt mà)</option>
                        <option value="Bright">Bright (Sáng, sắc nét)</option>
                        <option value="Bass-heavy">Bass-heavy (Sôi động, nhiều trầm)</option>
                        <option value="V-Shape">V-Shape (V-Shape, Fun)</option>
                        <option value="Harman">Harman Target (Đại chúng)</option>
                        <option value="Mid-forward">Mid-forward (Vocal)</option>
                    </select>
                </div>

                <div class="h-px w-full bg-gradient-to-r from-transparent via-[var(--b-grad-1)] to-transparent opacity-30 my-6"></div>

                <div id="sliders-container" class="space-y-5">
                    <!-- Sliders injected by JS -->
                </div>

                <!-- SUBMIT -->
                <div class="pt-6">
                    <button id="btn-submit" class="btn-metal-premium w-full py-4 uppercase font-black tracking-[0.2em] text-sm active:scale-[0.98]">
                        🚀 Analyze Data Core
                    </button>
                </div>
            </div>
        </div>

        <!-- KHU VỰC KẾT QUẢ -->
        <div id="results-container" class="space-y-4">
            <!-- Render kết quả tại đây -->
        </div>

    </div>

    <script>
        // CONFIG HỆ THỐNG
        const API_URL = "https://audiohub-h060.onrender.com/api/v1/recommend";
        let currentCat = "TWS";

        const SLIDER_DEF = {
            sound: "Chất lượng / Chi tiết Âm thanh",
            price: "Tối ưu Giá thành",
            anc: "Khử ồn chủ động (ANC)",
            battery: "Thời lượng Pin",
            codec: "Codec (LDAC, aptX)",
            ip: "Kháng nước (IP Rating)",
            power: "Công suất loa (Watts)"
        };

        const CAT_CONFIG = {
            TWS: ["sound", "anc", "battery", "codec", "ip", "price"],
            WIRED: ["sound", "price"],
            SPEAKER: ["sound", "power", "battery", "ip", "price"]
        };

        // RENDER SLIDERS ĐỘNG
        function renderSliders() {
            const container = document.getElementById('sliders-container');
            container.innerHTML = "";
            CAT_CONFIG[currentCat].forEach(key => {
                container.innerHTML += `
                    <div class="space-y-2">
                        <div class="flex justify-between text-sm font-medium">
                            <span class="text-[var(--text-sub)]">${SLIDER_DEF[key]}</span>
                            <span id="val-${key}" class="drop-shadow-lg" style="color: var(--metal-color)">50%</span>
                        </div>
                        <input type="range" id="w_${key}" min="0" max="100" value="50" class="premium-slider" oninput="document.getElementById('val-${key}').innerText = this.value + '%'">
                    </div>
                `;
            });
        }

        // CHUYỂN TAB
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentCat = e.target.dataset.cat;
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.className = "tab-btn px-6 py-2.5 rounded uppercase text-sm tracking-widest transition-all " + 
                        (b.dataset.cat === currentCat ? "tab-active" : "tab-inactive");
                });
                renderSliders();
            });
        });

        // ĐỔI THEME (GOLD/CYAN)
        function switchTheme() {
            document.documentElement.classList.toggle('theme-cyan');
            const isCyan = document.documentElement.classList.contains('theme-cyan');
            document.getElementById('title-text').innerText = isCyan ? "AUDIOHUB NEON" : "AUDIOHUB ENGINE";
            document.getElementById('sub-text').innerText = isCyan ? "Futuristic Signal Processor" : "MCDM Premium Calculation";
        }

        // GỌI API & RENDER RESULT
        const formatVND = (v) => new Intl.NumberFormat('vi-VN', {style: 'currency', currency: 'VND'}).format(v);
        
        document.getElementById('btn-submit').addEventListener('click', async () => {
            const btn = document.getElementById('btn-submit');
            const resBox = document.getElementById('results-container');
            
            // Loading state
            btn.disabled = true;
            btn.innerHTML = `<div class="flex justify-center items-center space-x-3"><div class="spinner-neon"></div><span>Processing Signal...</span></div>`;
            resBox.innerHTML = "";

            // Lấy data
            let weights = {};
            CAT_CONFIG[currentCat].forEach(k => weights[`w_${k}`] = parseInt(document.getElementById(`w_${k}`).value));

            try {
                const res = await fetch(API_URL, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ category: currentCat, user_pref: document.getElementById('userPref').value, custom_weights: weights, limit: 5 })
                });
                const data = await res.json();

                if (data.status === "success" && data.data.length > 0) {
                    let html = `<h3 class="text-xl font-bold uppercase tracking-widest mb-4 mt-8" style="color: var(--metal-color)">Recommended Hardware</h3>`;
                    data.data.forEach((item, i) => {
                        let badge = item.Driving_Advice ? `<span class="mt-2 inline-block px-3 py-1 text-xs font-bold bg-black/50 border border-[var(--metal-color)] text-[var(--metal-color)] rounded">⚡ ${item.Driving_Advice.advice}</span>` : "";
                        html += `
                            <div class="spec-border-premium p-5 mb-4 flex justify-between items-center hover:scale-[1.01] transition-transform bg-[var(--surface)] cursor-pointer">
                                <div>
                                    <span class="text-[10px] uppercase font-black px-2 py-1 bg-[var(--text-main)] text-black rounded tracking-widest">RANK #${i+1}</span>
                                    <h4 class="text-lg md:text-xl font-bold mt-2 text-[var(--text-main)]">${item.model_name} <span class="text-[var(--text-sub)] text-sm">by ${item.brand}</span></h4>
                                    <p class="text-sm text-[var(--text-sub)] mt-1">Signature: <span class="text-white">${item.sound_signature}</span></p>
                                    <p class="text-sm mt-1 font-bold" style="color: var(--metal-color)">${formatVND(item.price_vnd)}</p>
                                    ${badge}
                                </div>
                                <div class="text-right pl-4">
                                    <div class="text-2xl md:text-3xl font-black drop-shadow-lg" style="color: var(--metal-color)">${(item.Final_score * 100).toFixed(1)}%</div>
                                    <div class="text-[10px] text-[var(--text-sub)] uppercase tracking-widest mt-1">Match</div>
                                </div>
                            </div>
                        `;
                    });
                    resBox.innerHTML = html;
                } else {
                    resBox.innerHTML = `<div class="spec-border-premium p-6 text-center text-[var(--text-sub)]">No matches found for this config.</div>`;
                }
            } catch (err) {
                resBox.innerHTML = `<div class="spec-border-premium p-6 text-center text-red-400 border-red-900">API Connection Failed. Please check Render server.</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `🚀 Analyze Data Core`;
            }
        });

        // HIỆU ỨNG CHUỘT (PARTICLES)
        const dynamicCursor = document.getElementById('dynamic-cursor');
        let lastParticleTime = 0;
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX, y = e.clientY;
            requestAnimationFrame(() => {
                dynamicCursor.style.left = `${x}px`; dynamicCursor.style.top = `${y}px`;
                document.body.style.setProperty('--mouse-x', `${(x / window.innerWidth) * 100}%`);
                document.body.style.setProperty('--mouse-y', `${(y / window.innerHeight) * 100}%`);
            });
            if (Date.now() - lastParticleTime > 40) {
                const p = document.createElement('div'); p.className = 'particle';
                const s = Math.random() * 2 + 1; p.style.width = `${s}px`; p.style.height = `${s}px`;
                p.style.left = `${x + (Math.random() - 0.5) * 20}px`; p.style.top = `${y + (Math.random() - 0.5) * 20}px`;
                document.body.appendChild(p); setTimeout(() => p.remove(), 800);
                lastParticleTime = Date.now();
            }
        });

        // Khởi tạo slider ban đầu
        renderSliders();
    </script>
</body>
</html>
