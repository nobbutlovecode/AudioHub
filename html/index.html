<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioHub Recommender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-body: #050505; --surface: #0A0A0A; --surface-glass: rgba(10, 10, 10, 0.85);
            --text-main: #FFFFFF; --text-sub: #A3A3A3;
            --primary: #00E5FF; 
            --primary-grad: linear-gradient(135deg, #009FB3 0%, #7AF7FF 40%, #00E5FF 60%, #009FB3 100%);
            --fx-glow: rgba(0, 229, 255, 0.4); --b-color: #1F2A33;
        }
        html.theme-gold {
            --bg-body: #0A0A0A; --surface: #121212; --surface-glass: rgba(18, 18, 18, 0.85);
            --primary: #D4AF37; 
            --primary-grad: linear-gradient(135deg, #B8962E 0%, #F5D97A 40%, #D4AF37 60%, #B8962E 100%);
            --fx-glow: rgba(212, 175, 55, 0.4); --b-color: #2A2A2A;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Navbar & Dropdown Tối ưu */
        .glass-nav { background: var(--surface-glass); backdrop-filter: blur(12px); border-bottom: 1px solid var(--b-color); }
        .nav-link { color: var(--text-sub); transition: all 0.3s; cursor: pointer; }
        .nav-link:hover { color: var(--primary); text-shadow: 0 0 10px var(--fx-glow); }
        
        .cat-dropdown { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--b-color); border-radius: 12px; padding: 1.5rem; gap: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .nav-item-cat:hover .cat-dropdown { display: flex; }
        .cat-icon-box { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--b-color); display: flex; align-items: center; justify-content: center; transition: all 0.3s; cursor: pointer; color: var(--text-sub); }
        .cat-icon-box:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--fx-glow); color: var(--primary); }

        /* Tiện ích */
        .text-gradient { background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--fx-glow); outline: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--b-color); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- NAVBAR (Các Mục từ 1 đến 9) -->
    <nav class="glass-nav fixed top-0 left-0 w-full z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-8">
            <!-- 1. Brand -->
            <div class="text-xl font-black tracking-widest cursor-pointer text-gradient" onclick="window.scrollTo(0,0)">AUDIOHUB</div>
            
            <!-- 2. Categories & Icons (3,4,5) -->
            <div class="relative nav-item-cat py-2">
                <span class="font-bold uppercase text-sm nav-link">Categories ▾</span>
                <div class="cat-dropdown z-50">
                    <div class="flex flex-col items-center group">
                        <div class="cat-icon-box"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18v-5.5m0 0l4.5 4.5V7l-4.5 4.5m0 0L7.5 16m4.5-4.5V6L7.5 10.5"></path></svg></div>
                        <span class="text-[10px] mt-2 font-bold tracking-wider group-hover:text-[var(--primary)]">TWS</span>
                    </div>
                    <div class="flex flex-col items-center group">
                        <div class="cat-icon-box"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h10a4 4 0 004-4M3 15V9a9 9 0 0118 0v6M3 15h.01M21 15h.01M9 20h6"></path></svg></div>
                        <span class="text-[10px] mt-2 font-bold tracking-wider group-hover:text-[var(--primary)]">WIRED</span>
                    </div>
                    <div class="flex flex-col items-center group">
                        <div class="cat-icon-box"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6a2 2 0 012-2h2a2 2 0 012 2v13a2 2 0 01-2 2h-2a2 2 0 01-2-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div>
                        <span class="text-[10px] mt-2 font-bold tracking-wider group-hover:text-[var(--primary)]">SPEAKERS</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center space-x-6">
            <!-- 6. About & 7. Donate -->
            <span class="text-sm font-bold uppercase nav-link" onclick="openModal('modal-about')">About</span>
            <span class="text-sm font-bold uppercase nav-link" onclick="openModal('modal-donate')">Donate</span>
            
            <!-- 8. Your C-List -->
            <button onclick="openModal('modal-clist')" class="relative text-sm font-bold uppercase nav-link flex items-center gap-2 border border-[var(--b-color)] px-4 py-1.5 rounded-full hover:border-[var(--primary)]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                Your C-List
                <span id="clist-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full shadow-[0_0_10px_red] transition-transform">0</span>
            </button>

            <!-- 9. Theme Toggle -->
            <button onclick="toggleTheme()" class="text-xl nav-link">🌓</button>
        </div>
    </nav>

    <!-- 10. MAIN CONTENT (Hero & Search) -->
    <main class="pt-40 pb-16 px-6 flex flex-col items-center text-center min-h-screen">
        <h1 class="text-4xl md:text-5xl lg:text-6xl font-black tracking-widest text-gradient mb-4 uppercase">
            AudioHub Recommender Engine
        </h1>
        <p class="text-lg md:text-xl text-[var(--text-sub)] tracking-wide font-light mb-12 uppercase">
            Comparing TWS, IEM and speakers
        </p>

        <!-- Search Autocomplete Area -->
        <div class="relative w-full max-w-2xl z-40">
            <div class="relative flex items-center">
                <svg class="w-6 h-6 absolute left-5 text-[var(--text-sub)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="searchInput" placeholder="Search devices to add to C-List..." autocomplete="off" class="search-input w-full bg-[var(--surface)] border border-[var(--b-color)] text-white pl-14 pr-4 py-4 rounded-full text-lg shadow-lg">
            </div>
            
            <ul id="searchDropdown" class="absolute top-full left-0 w-full mt-2 bg-[var(--surface)] border border-[var(--primary)] rounded-xl shadow-[0_0_20px_var(--fx-glow)] overflow-hidden hidden text-left max-h-80 overflow-y-auto custom-scrollbar">
                <!-- Data injected by JS -->
            </ul>
        </div>
        
        <!-- Khối chứa thuật toán sẽ được chèn vào đây trong tương lai -->
        <div id="mcdm-container" class="mt-20 w-full max-w-5xl"></div>
    </main>

    <!-- Khu vực nhúng Modal tự động -->
    <div id="modals-injector"></div>

    <!-- Nạp file Script xử lý toàn bộ logic -->
    <script src="/html/js/app.js"></script>
</body>
</html>
